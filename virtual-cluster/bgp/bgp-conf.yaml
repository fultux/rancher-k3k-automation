# 1. Define the IP Pool for the Virtual Cluster
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ${VCLUSTER_NAMESPACE}-pool
  namespace: metallb-system
spec:
  addresses:
    - ${IP_POOL_RANGE}

---
# 2. Establish the BGP Peering Session to the Host Cluster Transit Router
apiVersion: metallb.io/v1beta2
kind: BGPPeer
metadata:
  name: peer-to-host-cluster
  namespace: metallb-system
spec:
  myASN: ${MY_ASN}
  peerASN: ${PEER_ASN}
  peerAddress: ${PEER_ADDRESS}
  ebgpMultiHop: true

---
# 3. Instruct MetalLB to advertise the Pool via the BGP Peer
apiVersion: metallb.io/v1beta1
kind: BGPAdvertisement
metadata:
  name: ${VCLUSTER_NAMESPACE}-bgp-adv
  namespace: metallb-system
spec:
  ipAddressPools:
    - ${VCLUSTER_NAMESPACE}-pool
