---
# 1: Create the Rancher cluster representation in the management cluster (local)
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: k3k-automation-rancher
  namespace: fleet-local
spec:
  repo: "https://github.com/fultux/rancher-k3k-automation.git" # Replace with your actual repository URL
  branch: main
  paths:
    - manifests-rancher
  targets:
    - clusterName: local

---
# 2: Deploy the k3k virtual cluster resource to the downstream host cluster
apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: k3k-automation-host
  namespace: fleet-default
spec:
  repo: "https://github.com/fultux/rancher-k3k-automation.git" # Replace with your actual repository URL
  branch: main
  paths:
    - host-cluster
  targets:
    # Replace with the actual name of your downstream cluster in Rancher Fleet
    - clusterName: host-cl-calio-multus
