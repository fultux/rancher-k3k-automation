apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: ${VCLUSTER_NAME}
  namespace: ${VCLUSTER_NAMESPACE}
spec:
  mode: ${VCLUSTER_MODE}
  version: ${VCLUSTER_VERSION}
  servers: ${VCLUSTER_SERVERS}
  agents: ${VCLUSTER_AGENTS}
${TLS_SANS_BLOCK}
  persistence:
    type: dynamic
    storageClassName: "${STORAGE_CLASS}"
    storageRequestSize: ${STORAGE_SIZE}
