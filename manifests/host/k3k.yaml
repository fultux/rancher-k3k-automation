apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: demo-shared
  namespace: shared-tenant
spec:
  mode: shared
  version: v1.35.4-k3s1
  servers: 1
  agents: 1
  persistence:
    type: dynamic
    storageClassName: "harvester"
    storageRequestSize: 3Gi
  sync:
    persistentVolumeClaims:
      enabled: true
    configMaps:
      enabled: true
    secrets:
      enabled: true
    ingresses:
      enabled: true
    storageClasses:
      enabled: true
      selector:
        tier: standard
