apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: ${VCLUSTER_NAME}
  namespace: fleet-default
  labels:
    deploy-metallb: allowed
  annotations:
    ui.rancher/k3k-namespace: ${VCLUSTER_NAMESPACE}
    ui.rancher/parent-cluster: ${PARENT_CLUSTER_ID}
    ui.rancher/parent-cluster-display: ${PARENT_CLUSTER_NAME}
    ui.rancher/provider: k3k
    rancher.io/imported-cluster-version-management: "false"
spec: {}
